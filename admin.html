<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helferdienst Uebersicht</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1b1f24;
      --muted: #5f6b7a;
      --line: #d9dee7;
      --accent: #0b6f8f;
      --taken: #eaf6ef;
      --free: #ffffff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .banner {
      width: 100%;
      height: clamp(150px, 24vw, 260px);
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 22px;
      border: 1px solid var(--line);
      display: block;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .title {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    select,
    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      background: #fff;
      font: inherit;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 8px 12px;
      font-weight: 800;
    }

    .table-wrap {
      overflow-x: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 840px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef1f5;
      font-size: 0.9rem;
    }

    tr.taken {
      background: var(--taken);
    }

    tr.free {
      background: var(--free);
    }

    .empty,
    .error {
      padding: 16px;
      color: var(--muted);
    }

    .error {
      color: #a83232;
    }

    @media (max-width: 760px) {
      header,
      .filters {
        display: grid;
        grid-template-columns: 1fr;
      }

      .title {
        align-items: flex-start;
      }

      .logo {
        width: 54px;
        height: 54px;
      }
    }
  </style>
</head>
<body>
  <main>
    <img class="banner" src="./assets/hockey-hv8pgxccazhw2af.jpg" alt="Hockeyturnier" />

    <header>
      <div class="title">
        <img class="logo" src="./assets/z88-logo.png" alt="Z88" />
        <div>
          <h1>Uebersicht</h1>
          <p>Filterbare Ansicht aller Schichten und Anmeldungen.</p>
        </div>
      </div>
      <a href="./index.html">Zur Anmeldung</a>
    </header>

    <section class="filters" aria-label="Filter">
      <label>
        Mannschaft
        <select id="team-filter">
          <option value="">Alle Mannschaften</option>
        </select>
      </label>
      <label>
        Station
        <select id="station-filter">
          <option value="">Alle Stationen</option>
        </select>
      </label>
      <label>
        Tag
        <select id="day-filter">
          <option value="">Alle Tage</option>
        </select>
      </label>
    </section>

    <section class="summary" aria-label="Zusammenfassung">
      <div class="pill" id="total-count">Gesamt: 0</div>
      <div class="pill" id="taken-count">Belegt: 0</div>
      <div class="pill" id="free-count">Frei: 0</div>
    </section>

    <section class="table-wrap" id="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Status</th>
            <th>Tag</th>
            <th>Zeit</th>
            <th>Station</th>
            <th>Schicht</th>
            <th>Name</th>
            <th>Mannschaft</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>

  <script>
    const db = window.supabase.createClient(
      window.APP_CONFIG.supabaseUrl,
      window.APP_CONFIG.supabasePublishableKey
    );

    const rowsBody = document.getElementById("rows");
    const teamFilter = document.getElementById("team-filter");
    const stationFilter = document.getElementById("station-filter");
    const dayFilter = document.getElementById("day-filter");
    const totalCount = document.getElementById("total-count");
    const takenCount = document.getElementById("taken-count");
    const freeCount = document.getElementById("free-count");
    let allRows = [];

    function formatDate(value) {
      if (!value) return "";
      return new Date(`${value}T00:00:00`).toLocaleDateString("de-DE");
    }

    function formatTime(startValue, endValue) {
      if (!startValue) return "";
      const start = new Date(startValue).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
      const end = endValue ? new Date(endValue).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }) : "";
      return end ? `${start} - ${end}` : start;
    }

    function uniqueValues(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "de"));
    }

    function fillSelect(select, values, firstLabel) {
      const current = select.value;
      select.innerHTML = `<option value="">${firstLabel}</option>`;
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
      select.value = values.includes(current) ? current : "";
    }

    function fillDaySelect(values) {
      const current = dayFilter.value;
      dayFilter.innerHTML = '<option value="">Alle Tage</option>';
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = formatDate(value);
        dayFilter.appendChild(option);
      });
      dayFilter.value = values.includes(current) ? current : "";
    }

    function renderFilters() {
      fillSelect(teamFilter, uniqueValues(allRows.map((row) => row.signup?.team)), "Alle Mannschaften");
      fillSelect(stationFilter, uniqueValues(allRows.map((row) => row.location)), "Alle Stationen");
      fillDaySelect(uniqueValues(allRows.map((row) => row.day)));
    }

    function filteredRows() {
      return allRows.filter((row) => {
        if (teamFilter.value && row.signup?.team !== teamFilter.value) return false;
        if (stationFilter.value && row.location !== stationFilter.value) return false;
        if (dayFilter.value && row.day !== dayFilter.value) return false;
        return true;
      });
    }

    function renderRows() {
      const rows = filteredRows();
      const taken = rows.filter((row) => row.is_taken).length;
      totalCount.textContent = `Gesamt: ${rows.length}`;
      takenCount.textContent = `Belegt: ${taken}`;
      freeCount.textContent = `Frei: ${rows.length - taken}`;

      rowsBody.innerHTML = "";
      if (!rows.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 7;
        td.className = "empty";
        td.textContent = "Keine Schichten fuer diese Filter.";
        tr.appendChild(td);
        rowsBody.appendChild(tr);
        return;
      }

      rows.forEach((row) => {
        const tr = document.createElement("tr");
        tr.className = row.is_taken ? "taken" : "free";
        const values = [
          row.is_taken ? "Belegt" : "Frei",
          formatDate(row.day),
          formatTime(row.start, row.end),
          row.location || "",
          row.name || "",
          row.signup?.name || "",
          row.signup?.team || ""
        ];
        values.forEach((value) => {
          const td = document.createElement("td");
          td.textContent = value;
          tr.appendChild(td);
        });
        rowsBody.appendChild(tr);
      });
    }

    async function loadData() {
      const { data: slots, error: slotsError } = await db
        .from("slots")
        .select("id, name, is_taken, day, location, start, end")
        .order("day", { ascending: true })
        .order("start", { ascending: true });

      if (slotsError) throw slotsError;

      const { data: signups, error: signupsError } = await db
        .from("signups")
        .select("id, name, team, slot_id");

      if (signupsError) throw signupsError;

      const signupBySlot = new Map(signups.map((signup) => [signup.slot_id, signup]));
      allRows = slots.map((slot) => ({
        ...slot,
        signup: signupBySlot.get(slot.id) || null
      }));
      renderFilters();
      renderRows();
    }

    [teamFilter, stationFilter, dayFilter].forEach((input) => {
      input.addEventListener("input", renderRows);
    });

    loadData().catch((error) => {
      rowsBody.innerHTML = `<tr><td class="error" colspan="7">${error.message || "Daten konnten nicht geladen werden."}</td></tr>`;
    });
  </script>
</body>
</html>
